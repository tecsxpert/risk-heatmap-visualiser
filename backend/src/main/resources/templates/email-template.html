<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Risk Notification</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #1B4F8A; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background-color: #f9f9f9; }
        .footer { text-align: center; padding: 10px; color: #666; font-size: 12px; }
        .button { display: inline-block; padding: 10px 20px; background-color: #1B4F8A; color: white; text-decoration: none; border-radius: 5px; }
        .alert { background-color: #fff3cd; border: 1px solid #ffc107; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Tool-05 Risk Heatmap Visualiser</h1>
    </div>
    <div class="content">
        <p th:text="${'Risk: ' + riskTitle}">Risk: Sample Risk</p>
        <p th:text="${'Risk ID: ' + riskId}">Risk ID: 1</p>
        <div class="alert" th:if="${ownerName}">
            <strong>Attention:</strong> This risk requires your attention.
        </div>
        <p>Please log in to the Risk Heatmap Visualiser to review and take action.</p>
        <p style="text-align: center;">
            <a th:href="${baseUrl}" class="button">View Risk</a>
        </p>
    </div>
    <div class="footer">
        <p>This is an automated message from Tool-05 Risk Heatmap Visualiser.</p>
        <p>Please do not reply to this email.</p>
    </div>
</div>
</body>
</html>
