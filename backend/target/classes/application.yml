server:
  port: 8080

spring:
  application:
    name: risk-heatmap-visualiser
  
  # PostgreSQL Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/risk_heatmap}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update # Since we aren't doing Flyway in Day 1-10
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Mail Configuration
  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:user}
    password: ${MAIL_PASSWORD:pass}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:8a4b6c3d2e1f9g0h8a4b6c3d2e1f9g0h8a4b6c3d2e1f9g0h} # Minimum 256 bits
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# File upload configuration
upload:
  dir: ${UPLOAD_DIR:uploads}
